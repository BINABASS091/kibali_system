<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>{{ permit.permit_number }} - Kibali cha Ujenzi</title>
  <style>
    @page {
      size: 127mm 178mm;
      margin: 0;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
    }

    .page {
      position: relative;
      width: 127mm;
      height: 178mm;
      overflow: hidden;
      background-color: #fff;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      {% if background_url %}
      background-image: url("{{ background_url }}");
      {% endif %}
    }

    .field {
      position: absolute;
      z-index: 2;
      font-size: 10.5pt;
      line-height: 1;
      color: #111;
      font-weight: bold;
    }

    .field span {
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="field" style="top: {{ field_positions.applicant.top }}; left: {{ field_positions.applicant.left }};">
      {{ permit.jina }}
    </div>

    <div class="field" style="top: {{ field_positions.construction.top }}; left: {{ field_positions.construction.left }};">
      {{ permit.get_aina_display }}
    </div>

    <div class="field" style="top: {{ field_positions.location.top }}; left: {{ field_positions.location.left }};">
      {{ permit.pahala }}
    </div>

    <div class="field" style="top: {{ field_positions.shehia.top }}; left: {{ field_positions.shehia.left }};">
      {{ permit.shehia }}
    </div>

    <div class="field" style="top: {{ field_positions.kaskazini.top }}; left: {{ field_positions.kaskazini.left }};">
      {{ permit.kaskazini }}
    </div>

    <div class="field" style="top: {{ field_positions.mashariki.top }}; left: {{ field_positions.mashariki.left }};">
      {{ permit.mashariki }}
    </div>

    <div class="field" style="top: {{ field_positions.magharibi.top }}; left: {{ field_positions.magharibi.left }};">
      {{ permit.magharibi }}
    </div>

    <div class="field" style="top: {{ field_positions.kusini.top }}; left: {{ field_positions.kusini.left }};">
      {{ permit.kusini }}
    </div>

    <div class="field" style="top: {{ field_positions.upana.top }}; left: {{ field_positions.upana.left }};">
      {{ permit.upana }}
    </div>

    <div class="field" style="top: {{ field_positions.urefu.top }}; left: {{ field_positions.urefu.left }};">
      {{ permit.urefu }}
    </div>

    <div class="field" style="top: {{ field_positions.tarehe_kutolewa.top }}; left: {{ field_positions.tarehe_kutolewa.left }};">
      {{ permit.tarehe_kutolewa|date:"d/m/Y" }}
    </div>

    <div class="field" style="top: {{ field_positions.tarehe_mwisho.top }}; left: {{ field_positions.tarehe_mwisho.left }};">
      {{ permit.tarehe_mwisho|date:"d/m/Y" }}
    </div>
  </div>
</body>
</html>
